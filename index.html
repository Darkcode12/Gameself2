<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GameShelf" />
  <title>GameShelf</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-icon">◈</div>
      <div class="splash-name">GameShelf</div>
    </div>
  </div>

  <!-- TOPBAR -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="app-logo">◈</span>
      <span class="app-name">GameShelf</span>
    </div>
    <div class="topbar-right">
      <span class="game-count" id="gameCount">0 juegos</span>
      <button class="icon-btn icon-btn-ghost" id="btnSettings" title="Ajustes">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
      <button class="icon-btn" id="btnAdd" title="Agregar juego">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><line x1="10" y1="3" x2="10" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="10" x2="17" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <!-- TOOLBAR -->
  <div id="toolbar">
    <div class="sort-btns">
      <button class="sort-btn active" data-sort="recent" data-dir="desc">Recientes ↓</button>
      <button class="sort-btn" data-sort="alpha" data-dir="asc">A–Z ↑</button>
    </div>
    <div class="view-btns">
      <button class="view-btn active" data-view="grid" title="Cuadrícula">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      </button>
      <button class="view-btn" data-view="list" title="Lista">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="5" height="5" rx="1"/><rect x="8" y="3" width="7" height="1.5" rx="0.75"/><rect x="8" y="5.5" width="5" height="1.5" rx="0.75"/><rect x="1" y="9" width="5" height="5" rx="1"/><rect x="8" y="10" width="7" height="1.5" rx="0.75"/><rect x="8" y="12.5" width="5" height="1.5" rx="0.75"/></svg>
      </button>
    </div>
  </div>

  <!-- COLLECTION -->
  <main id="main">
    <div id="collection"></div>
    <div id="emptyState" class="empty-state">
      <div class="empty-glyph">◈</div>
      <p>Tu colección está vacía</p>
      <span>Toca <strong>+</strong> para agregar tu primer juego</span>
    </div>
  </main>

  <!-- MODAL AGREGAR -->
  <div class="overlay" id="addOverlay">
    <div class="sheet" id="addSheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Agregar juego</div>

      <div class="field">
        <label>Nombre del juego</label>
        <input type="text" id="inp-name" placeholder="Ej. The Last of Us, Hollow Knight..." autocomplete="off" />
      </div>

      <div class="field">
        <label>Portada</label>
        <div class="img-tabs">
          <button class="itab active" data-tab="url">URL de imagen</button>
          <button class="itab" data-tab="file">Subir foto</button>
        </div>
        <div id="tab-url">
          <input type="url" id="inp-url" placeholder="https://..." autocomplete="off" />
        </div>
        <div id="tab-file" style="display:none">
          <label class="file-area" for="inp-file">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span id="file-label">Toca para elegir imagen</span>
            <input type="file" id="inp-file" accept="image/*" />
          </label>
        </div>
        <div id="img-preview-wrap" style="display:none">
          <img id="img-preview" class="cover-preview" />
          <button class="clear-img" id="btnClearImg">✕ Quitar</button>
        </div>
      </div>

      <button class="btn-primary" id="btnSave">Guardar juego</button>
    </div>
  </div>

  <!-- MODAL DETALLE -->
  <div class="overlay" id="detailOverlay">
    <div class="sheet detail-sheet" id="detailSheet">
      <div class="sheet-handle"></div>
      <div class="detail-cover-wrap">
        <div id="detail-cover" class="detail-cover"></div>
      </div>
      <div class="detail-info">
        <div class="detail-name" id="detail-name"></div>
        <button class="detail-date-btn" id="detail-date" title="Editar fecha">
          <span id="detail-date-text"></span>
          <span class="date-edit-icon">✎</span>
        </button>
      </div>
      <div class="detail-actions">
        <button class="btn-edit" id="btnEdit">✎ Editar nombre</button>
        <button class="btn-danger" id="btnDelete">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- MODAL EDITAR NOMBRE -->
  <div class="overlay" id="editOverlay">
    <div class="sheet edit-sheet" id="editSheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Editar nombre</div>
      <div class="field">
        <label>Nombre</label>
        <input type="text" id="inp-edit-name" autocomplete="off" />
      </div>
      <button class="btn-primary" id="btnSaveEdit">Guardar cambio</button>
    </div>
  </div>

  <!-- MODAL AJUSTES -->
  <div class="overlay" id="settingsOverlay">
    <div class="sheet settings-sheet" id="settingsSheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Ajustes</div>

      <div class="field">
        <label>Nombre de la app</label>
        <input type="text" id="inp-app-name" placeholder="GameShelf" autocomplete="off" maxlength="24" />
      </div>

      <div class="field">
        <label>Color de acento</label>
        <div class="color-grid" id="colorGrid"></div>
        <div class="custom-color-row">
          <span class="custom-color-label">Color personalizado</span>
          <input type="color" id="inp-custom-color" class="color-picker" />
        </div>
      </div>

      <button class="btn-primary" id="btnSaveSettings">Guardar ajustes</button>

      <div class="field">
        <label>Copia de seguridad</label>
        <div class="backup-row">
          <button class="btn-backup" id="btnExport">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exportar colección
          </button>
          <button class="btn-backup btn-backup-import" id="btnImport">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Importar colección
          </button>
          <input type="file" id="inp-backup-file" accept=".json" style="display:none" />
        </div>
        <div class="backup-hint" id="backupHint"></div>
      </div>
    </div>
  </div>

  <!-- MODAL EDITAR FECHA -->
  <div class="overlay" id="dateOverlay">
    <div class="sheet edit-sheet" id="dateSheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Editar fecha</div>
      <div class="field">
        <label>Fecha y hora</label>
        <input type="datetime-local" id="inp-edit-date" />
      </div>
      <button class="btn-primary" id="btnSaveDate">Guardar fecha</button>
    </div>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
